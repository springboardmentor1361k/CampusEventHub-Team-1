
<section class="hero">
  <div class="hero-content">
    <h1>CampusEventHub</h1>
    <p>Connect • Engage • Participate in Inter-College Events</p>
    <div class="hero-buttons">
      <a routerLink="/events" class="btn btn-primary btn-large">Explore Events</a>
      <a *ngIf="!(authService.isAuthenticated$ | async)" routerLink="/auth/login" class="btn btn-secondary btn-large">Login to Dashboard</a>
    </div>
  </div>
</section>

<section class="features">
  <h2>Why CampusEventHub?</h2>
  <div class="features-grid">
    <div *ngFor="let feature of features" class="feature-card" [routerLink]="feature.link" style="cursor: pointer;">
      <div class="feature-icon">{{ feature.icon }}</div>
      <h3>{{ feature.title }}</h3>
      <p>{{ feature.description }}</p>
    </div>
  </div>
</section>

<footer class="footer">
  <p>&copy; 2024 CampusEventHub. All rights reserved.</p>
</footer>
